<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สต็อกรถ - MOTOR MASTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; font-family: 'Sarabun', sans-serif; padding-bottom: 90px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-btn { border: none; background: none; font-weight: bold; color: #6c757d; font-size: 0.8rem; text-decoration: none; text-align: center; width: 25%; }
        .nav-btn.active { color: #0d6efd; }
        .card-bike { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-fixed { background: white; position: sticky; top: 0; z-index: 900; margin-bottom: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-around; }
        .tab-item { padding: 12px; border: none; background: none; font-weight: bold; color: #6c757d; font-size: 0.9rem; flex: 1; }
        .tab-item.active { color: #0d6efd; border-bottom: 3px solid #0d6efd; }
    </style>
</head>
<body>
    <div class="tab-fixed shadow-sm">
        <button class="tab-item active" onclick="renderInventory('all')">ทั้งหมด</button>
        <button class="tab-item text-danger" onclick="renderInventory('ซ่อม')">กำลังซ่อม</button>
        <button class="tab-item text-success" onclick="renderInventory('พร้อมขาย')">พร้อมขาย</button>
    </div>

    <div class="container mt-2">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold m-0" id="list-title">🏍️ รายการรถทั้งหมด</h6>
            <button class="btn btn-primary btn-sm rounded-pill fw-bold" onclick="openBikeModal('add')">+ เพิ่มรถ</button>
        </div>
        <div id="list-inventory">กำลังโหลดข้อมูล...</div>
    </div>

    <div class="nav-bottom shadow">
        <a href="index.html" class="nav-btn">🏠 หน้าแรก</a>
        <a href="inventory.html" class="nav-btn active">🏍️ สต็อก</a>
        <a href="repair.html" class="nav-btn">🛠️ อู่ซ่อม</a>
        <a href="finance.html" class="nav-btn">💰 บัญชี</a>
    </div>

    <div class="modal fade" id="modal-bike" tabindex="-1"><div class="modal-dialog modal-dialog-scrollable"><div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-dark text-white"><h6 class="modal-title fw-bold" id="bikeModalTitle">ข้อมูลรถ</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body p-4 small">
            <input type="hidden" id="m-rowIdx">
            <div class="row g-2 mb-3">
                <div class="col-6"><label class="fw-bold">ทะเบียน</label><input type="text" id="m-plate" class="form-control form-control-sm"></div>
                <div class="col-6"><label class="fw-bold">รุ่นรถ</label><input type="text" id="m-model" class="form-control form-control-sm"></div>
            </div>
            
            <div class="bg-primary bg-opacity-10 p-2 rounded mb-3 border">
                <label class="fw-bold small text-primary mb-1">การตั้งราคา</label>
                <div class="row g-1">
                    <div class="col-6"><label class="x-small">ราคาประมูล</label><input type="number" id="m-hammer" class="form-control form-control-sm" readonly></div>
                    <div class="col-6"><label class="x-small text-success fw-bold">ราคาตั้งขาย (ขายเท่าไหร่)</label><input type="number" id="m-target" class="form-control form-control-sm border-success"></div>
                </div>
            </div>

            <div class="row g-2">
                <div class="col-6"><label class="fw-bold">สถานะรถ</label><select id="m-status" class="form-select form-select-sm"><option>รอซ่อม</option><option>ซ่อมอยู่</option><option>พร้อมขาย</option></select></div>
                <div class="col-6"><label class="fw-bold">สถานะเล่ม</label><select id="m-book" class="form-select form-select-sm"><option>อยู่ที่ร้าน</option><option>รอชุดโอน</option><option>ส่งโอนแล้ว</option></select></div>
            </div>
            <button class="btn btn-primary w-100 fw-bold py-2 mt-4 shadow" onclick="saveBike()">💾 บันทึกข้อมูล</button>
        </div>
    </div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyoFOD4-wunr3zVSXDwbF4dFArNwvEw1ZN1AqqzZyN8hvfzrqzcWDk_kaDexJ9x2-M/exec";
        let allBikes = [];

        async function load() {
            const res = await fetch(`${API_URL}?action=getMasterData`);
            const data = await res.json();
            allBikes = data.bikes;
            renderInventory('all');
        }

        function renderInventory(filter) {
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            let h = '';
            allBikes.forEach(b => {
                if(filter === 'all' || b.status.includes(filter)) {
                    h += `<div class="card-bike border-start border-5 ${b.status==='พร้อมขาย'?'border-success':'border-warning'}">
                        <div class="d-flex justify-content-between mb-2"><b>${b.model}</b> <span class="badge bg-dark">${b.plate}</span></div>
                        <div class="small">💰 ทุนรวม: ฿${b.totalInv.toLocaleString()}</div>
                        <div class="small text-success fw-bold">🏷️ ราคาตั้งขาย: ฿${(b.targetPrice||0).toLocaleString()}</div>
                        <button class="btn btn-outline-primary btn-sm w-100 mt-2 fw-bold" onclick="openEdit(${b.rowIdx})">✏️ จัดการ</button>
                    </div>`;
                }
            });
            document.getElementById('list-inventory').innerHTML = h || '<p class="text-center p-5">ไม่พบข้อมูล</p>';
        }

        function openEdit(rowIdx) {
            const b = allBikes.find(x => x.rowIdx === rowIdx);
            document.getElementById('m-rowIdx').value = b.rowIdx;
            document.getElementById('m-plate').value = b.plate;
            document.getElementById('m-model').value = b.model;
            document.getElementById('m-hammer').value = b.hammer;
            document.getElementById('m-target').value = b.targetPrice || 0;
            document.getElementById('m-status').value = b.status;
            new bootstrap.Modal(document.getElementById('modal-bike')).show();
        }

        async function saveBike() {
            const payload = {
                action: 'updateBike',
                rowIdx: document.getElementById('m-rowIdx').value,
                targetPrice: document.getElementById('m-target').value,
                status: document.getElementById('m-status').value,
                // ใส่ค่าอื่นๆ ที่จำเป็น...
            };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            location.reload();
        }

        window.onload = load;
    </script>
</body>
</html>
