<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สต็อกรถ - MOTOR MASTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; font-family: 'Sarabun', sans-serif; padding-bottom: 90px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-btn { border: none; background: none; font-weight: bold; color: #6c757d; font-size: 0.8rem; text-decoration: none; text-align: center; width: 25%; }
        .nav-btn.active { color: #0d6efd; }
        .card-bike { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-fixed { background: white; position: sticky; top: 0; z-index: 900; margin-bottom: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-around; }
        .tab-item { padding: 12px; border: none; background: none; font-weight: bold; color: #6c757d; font-size: 0.85rem; flex: 1; border-bottom: 3px solid transparent; }
        .tab-item.active { color: #0d6efd; border-bottom: 3px solid #0d6efd; }
        .data-label { font-size: 0.65rem; color: #888; font-weight: bold; text-transform: uppercase; }
        .data-value { font-size: 0.8rem; font-weight: 600; color: #333; }
        .text-urgent { color: #dc3545 !important; font-weight: 800 !important; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner-border text-primary mb-2"></div><div class="fw-bold">กำลังซิงค์ข้อมูล...</div></div>

    <div class="tab-fixed shadow-sm">
        <button class="tab-item active" id="tab-all" onclick="filterInventory('all')">สต็อกทั้งหมด</button>
        <button class="tab-item" id="tab-repair" onclick="filterInventory('repair')">กำลังซ่อม</button>
        <button class="tab-item" id="tab-ready" onclick="filterInventory('ready')">พร้อมขาย</button>
    </div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <input type="text" id="search" class="form-control form-control-sm w-75 shadow-sm" placeholder="🔍 ทะเบียน/รุ่น/เลขเครื่อง..." onkeyup="filterInventory(currentFilter)">
            <button class="btn btn-primary btn-sm rounded-pill fw-bold px-3" onclick="openBikeModal('add')">+ เพิ่มรถ</button>
        </div>
        <div id="list-inventory"></div>
    </div>

    <div class="nav-bottom shadow">
        <a href="index.html" class="nav-btn">🏠 หน้าแรก</a>
        <a href="inventory.html" class="nav-btn active">🏍️ สต็อก</a>
        <a href="repair.html" class="nav-btn">🛠️ อู่ซ่อม</a>
        <a href="finance.html" class="nav-btn">💰 บัญชี</a>
    </div>

    <div class="modal fade" id="modal-bike" tabindex="-1"><div class="modal-dialog modal-dialog-scrollable"><div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-dark text-white"><h6 class="modal-title fw-bold" id="bikeModalTitle">รายละเอียดรถ</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body p-4 small">
            <input type="hidden" id="m-rowIdx">
            
            <div class="row g-2 mb-3">
                <div class="col-6"><label class="fw-bold text-muted">วันที่ซื้อเข้า (พ.ศ.)</label><input type="text" id="m-buyDate" class="form-control form-control-sm date-mask" placeholder="วว/ดด/25XX"></div>
                <div class="col-6"><label class="fw-bold text-muted">ทะเบียนรถ</label><input type="text" id="m-plate" class="form-control form-control-sm"></div>
                <div class="col-6"><label class="fw-bold text-muted">ยี่ห้อ</label><select id="m-brand" class="form-select form-select-sm"><option>HONDA</option><option>YAMAHA</option><option>อื่นๆ</option></select></div>
                <div class="col-6"><label class="fw-bold text-muted">รุ่นรถ</label><input type="text" id="m-model" class="form-control form-control-sm"></div>
                <div class="col-6"><label class="fw-bold text-muted">ปีผลิต</label><input type="number" id="m-year" class="form-control form-control-sm"></div>
                <div class="col-6"><label class="fw-bold text-muted">สีรถ</label><input type="text" id="m-color" class="form-control form-control-sm"></div>
            </div>
            
            <div class="bg-light p-2 rounded mb-3 border">
                <label class="fw-bold small text-primary mb-1"><i class="bi bi-info-circle"></i> เลขตัวถัง / เลขเครื่องยนต์</label>
                <div class="row g-1 mb-2">
                    <div class="col-6"><input type="text" id="m-cha" class="form-control form-control-sm" placeholder="เลขตัวถัง"></div>
                    <div class="col-6"><input type="text" id="m-eng" class="form-control form-control-sm" placeholder="เลขเครื่องยนต์"></div>
                </div>
                <label class="fw-bold small text-muted">แหล่งที่ซื้อ / ลานประมูล</label>
                <input type="text" id="m-source" class="form-control form-control-sm mb-1" placeholder="เช่น SIA / ชื่อเจ้าของเดิม">
                <input type="text" id="m-lot" class="form-control form-control-sm" placeholder="เลขล็อต (ถ้ามี)">
            </div>

            <div class="bg-primary bg-opacity-10 p-2 rounded mb-3 border border-primary border-opacity-25">
                <label class="fw-bold small text-primary mb-1"><i class="bi bi-currency-dollar"></i> การเงินและราคาขาย</label>
                <div class="row g-1">
                    <div class="col-4"><label class="x-small">ราคาซื้อ</label><input type="number" id="m-hammer" class="form-control form-control-sm"></div>
                    <div class="col-4"><label class="x-small">ค่าดำเนินการ</label><input type="number" id="m-fee" class="form-control form-control-sm"></div>
                    <div class="col-4"><label class="x-small text-success fw-bold">ราคาตั้งขาย</label><input type="number" id="m-target" class="form-control form-control-sm border-success fw-bold"></div>
                </div>
            </div>

            <div class="bg-danger bg-opacity-10 p-2 rounded mb-3 border border-danger border-opacity-25">
                <label class="fw-bold small text-danger mb-1"><i class="bi bi-calendar-event"></i> วันหมดอายุเอกสาร (พ.ศ.)</label>
                <div class="row g-2">
                    <div class="col-6"><label class="x-small">ภาษีหมดอายุ</label><input type="text" id="m-taxExp" class="form-control form-control-sm date-mask" placeholder="วว/ดด/25XX"></div>
                    <div class="col-6"><label class="x-small">บัตร ปชช หมด</label><input type="text" id="m-idExp" class="form-control form-control-sm date-mask" placeholder="วว/ดด/25XX"></div>
                </div>
            </div>

            <div class="row g-2">
                <div class="col-6"><label class="fw-bold text-muted">สถานะรถ</label><select id="m-status" class="form-select form-select-sm"><option>รอซ่อม</option><option>ซ่อมอยู่</option><option>พร้อมขาย</option></select></div>
                <div class="col-6"><label class="fw-bold text-muted">สถานะเล่ม</label><select id="m-book" class="form-select form-select-sm"><option>อยู่ที่ร้าน</option><option>รอชุดโอน</option><option>ส่งโอนแล้ว</option><option>โอนเสร็จ</option></select></div>
                <div class="col-12"><label class="fw-bold text-muted">หมายเหตุสต็อก</label><textarea id="m-stockNote" class="form-control form-control-sm" rows="2"></textarea></div>
            </div>
            
            <div class="mt-4">
                <button class="btn btn-primary w-100 fw-bold py-2 shadow-sm mb-2" onclick="saveBike()">💾 บันทึกข้อมูลเข้า Google Sheets</button>
                <button class="btn btn-outline-danger w-100 fw-bold py-2 btn-sm" id="btn-delete" style="display:none;" onclick="deleteBike()">🗑️ ลบรถออกจากสต็อกถาวร</button>
            </div>
        </div>
    </div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyoFOD4-wunr3zVSXDwbF4dFArNwvEw1ZN1AqqzZyN8hvfzrqzcWDk_kaDexJ9x2-M/exec";
        let allBikes = [];
        let bikeModal = null;
        let currentFilter = 'all';

        window.onload = function() {
            bikeModal = new bootstrap.Modal(document.getElementById('modal-bike'));
            // ระบบเติม / อัตโนมัติ (Input Mask)
            document.querySelectorAll('.date-mask').forEach(input => {
                input.addEventListener('input', function(e) {
                    let v = e.target.value.replace(/\D/g, '').slice(0, 8);
                    if (v.length >= 5) v = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4);
                    else if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
                    e.target.value = v;
                });
            });
            loadInventory();
        };

        async function loadInventory() {
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(`${API_URL}?action=getMasterData`);
                const data = await res.json();
                allBikes = data.bikes;
                filterInventory('all');
            } catch (e) { alert("ดึงข้อมูลไม่สำเร็จ โปรดรีเฟรชหน้าจอ"); }
            document.getElementById('loader').style.display = 'none';
        }

        const checkUrgent = (str) => {
            if (!str || str === "-") return "";
            let p = str.split(/[\/\-]/);
            if (p.length !== 3) return "";
            let d = parseInt(p[0]), m = parseInt(p[1]) - 1, y = parseInt(p[2]);
            if (y > 2400) y -= 543;
            const diff = (new Date(y, m, d) - new Date()) / (1000*60*60*24);
            return (diff <= 30 && diff > -365) ? "text-urgent" : "";
        };

        function filterInventory(type) {
            currentFilter = type;
            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');

            const q = document.getElementById('search').value.toLowerCase();
            let html = '';
            
            allBikes.forEach(b => {
                const searchTxt = `${b.plate} ${b.model} ${b.eng} ${b.cha}`.toLowerCase();
                const isMatchSearch = searchTxt.includes(q);
                let isMatchTab = false;
                if(type === 'all') isMatchTab = true;
                if(type === 'repair' && (b.status === 'รอซ่อม' || b.status === 'ซ่อมอยู่')) isMatchTab = true;
                if(type === 'ready' && b.status === 'พร้อมขาย') isMatchTab = true;

                if(isMatchSearch && isMatchTab) {
                    const color = b.status === 'พร้อมขาย' ? 'border-success' : 'border-warning';
                    html += `
                    <div class="card-bike border-start border-5 ${color}">
                        <div class="d-flex justify-content-between mb-2 align-items-start">
                            <div><span class="badge bg-dark mb-1">${b.plate || 'ไม่มีทะเบียน'}</span><h6 class="fw-bold m-0">${b.brand} ${b.model}</h6></div>
                            <span class="badge ${b.status==='พร้อมขาย'?'bg-success':'bg-warning text-dark'}">${b.status}</span>
                        </div>
                        
                        <div class="mb-2 p-2 bg-light rounded" style="font-size: 0.75rem;">
                            <div class="row">
                                <div class="col-6"><b>ถัง:</b> ${b.cha || '-'}</div>
                                <div class="col-6"><b>เครื่อง:</b> ${b.eng || '-'}</div>
                            </div>
                        </div>

                        <div class="row g-0 mb-2 border-bottom pb-2 text-center">
                            <div class="col-4 border-end pe-1"><div class="data-label">ทุนรถ</div><div class="data-value text-primary">฿${(b.hammer||0).toLocaleString()}</div></div>
                            <div class="col-4 border-end px-1"><div class="data-label">ค่าซ่อม</div><div class="data-value text-danger">฿${(b.repairSum||0).toLocaleString()}</div></div>
                            <div class="col-4 ps-1"><div class="data-label text-success">ตั้งขาย</div><div class="data-value text-success">฿${(b.targetPrice||0).toLocaleString()}</div></div>
                        </div>

                        <div class="row g-0 mb-3">
                            <div class="col-6 border-end pe-2"><div class="data-label">📅 ภาษีหมด</div><div class="data-value ${checkUrgent(b.taxExp)}">${b.taxExp || '-'}</div></div>
                            <div class="col-6 ps-2"><div class="data-label">🪪 บัตร ปชช.</div><div class="data-value ${checkUrgent(b.idExp)}">${b.idExp || '-'}</div></div>
                        </div>
                        
                        <button class="btn btn-outline-primary btn-sm w-100 fw-bold" onclick="openEdit(${b.rowIdx})">✏️ แก้ไข / ดูประวัติซ่อม</button>
                    </div>`;
                }
            });
            document.getElementById('list-inventory').innerHTML = html || '<p class="text-center p-5 text-muted">ไม่พบรายการ</p>';
        }

        function openEdit(rowIdx) {
            const b = allBikes.find(x => x.rowIdx === rowIdx);
            if(!b) return;
            document.getElementById('m-rowIdx').value = b.rowIdx;
            document.getElementById('bikeModalTitle').innerText = "แก้ไข - " + b.plate;
            document.getElementById('btn-delete').style.display = 'block';
            
            document.getElementById('m-buyDate').value = b.buyDate || "";
            document.getElementById('m-plate').value = b.plate || "";
            document.getElementById('m-brand').value = b.brand || "HONDA";
            document.getElementById('m-model').value = b.model || "";
            document.getElementById('m-year').value = b.year || "";
            document.getElementById('m-color').value = b.color || "";
            document.getElementById('m-eng').value = b.eng || "";
            document.getElementById('m-cha').value = b.cha || "";
            document.getElementById('m-source').value = b.source || "";
            document.getElementById('m-lot').value = b.lot || "";
            document.getElementById('m-hammer').value = b.hammer || 0;
            document.getElementById('m-fee').value = (b.totalInv - b.hammer - b.repairSum) || 0;
            document.getElementById('m-target').value = b.targetPrice || 0;
            document.getElementById('m-taxExp').value = b.taxExp || "";
            document.getElementById('m-idExp').value = b.idExp || "";
            document.getElementById('m-status').value = b.status || "รอซ่อม";
            document.getElementById('m-book').value = b.bookStatus || "อยู่ที่ร้าน";
            document.getElementById('m-stockNote').value = b.stockNote || "";
            bikeModal.show();
        }

        function openBikeModal(mode) {
            document.getElementById('m-rowIdx').value = "";
            document.getElementById('bikeModalTitle').innerText = "ลงทะเบียนรถใหม่";
            document.getElementById('btn-delete').style.display = 'none';
            const ids = ['buyDate','plate','model','year','color','eng','cha','source','lot','hammer','fee','target','taxExp','idExp','stockNote'];
            ids.forEach(id => document.getElementById('m-'+id).value = "");
            bikeModal.show();
        }

        async function saveBike() {
            const rowIdx = document.getElementById('m-rowIdx').value;
            const payload = {
                action: rowIdx ? 'updateBike' : 'saveBike', rowIdx: rowIdx,
                buyDate: document.getElementById('m-buyDate').value, plate: document.getElementById('m-plate').value,
                brand: document.getElementById('m-brand').value, model: document.getElementById('m-model').value,
                year: document.getElementById('m-year').value, color: document.getElementById('m-color').value,
                eng: document.getElementById('m-eng').value, cha: document.getElementById('m-cha').value,
                source: document.getElementById('m-source').value, lot: document.getElementById('m-lot').value,
                hammer: document.getElementById('m-hammer').value || 0, fee: document.getElementById('m-fee').value || 0,
                targetPrice: document.getElementById('m-target').value || 0,
                taxExp: document.getElementById('m-taxExp').value, idExp: document.getElementById('m-idExp').value,
                status: document.getElementById('m-status').value, bookStatus: document.getElementById('m-book').value,
                stockNote: document.getElementById('m-stockNote').value
            };
            document.getElementById('loader').style.display = 'flex';
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            location.reload();
        }

        async function deleteBike() {
            if(!confirm('ยืนยันลบรถคันนี้ออกจากสต็อกถาวร?')) return;
            const rowIdx = document.getElementById('m-rowIdx').value;
            document.getElementById('loader').style.display = 'flex';
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteBike', rowIdx: rowIdx }) });
            location.reload();
        }
    </script>
</body>
</html>
