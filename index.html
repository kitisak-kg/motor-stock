<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าแรก - MOTOR MASTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f0f2f5; font-family: 'Sarabun', sans-serif; padding-bottom: 90px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-btn { border: none; background: none; font-weight: bold; color: #6c757d; font-size: 0.8rem; text-decoration: none; text-align: center; width: 25%; }
        .nav-btn.active { color: #0d6efd; }
        .card-dash { background: white; border-radius: 15px; padding: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-box { border-radius: 10px; padding: 10px; text-align: center; color: white; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h5 class="fw-bold mb-3"><i class="bi bi-graph-up-arrow"></i> สรุปการเงิน</h5>
        <div class="row g-2 mb-4">
            <div class="col-6"><div class="card-dash border-start border-4 border-primary">
                <small class="text-muted">เงินสดคงเหลือ</small><h4 class="fw-bold text-primary" id="dash-bal">฿0</h4>
            </div></div>
            <div class="col-6"><div class="card-dash border-start border-4 border-success">
                <small class="text-muted">กำไรสะสม</small><h4 class="fw-bold text-success" id="dash-pro">฿0</h4>
            </div></div>
            <div class="col-12"><div class="card-dash bg-dark text-white">
                <small class="opacity-75">เงินจมในสต็อกรถทั้งหมด</small><h4 class="fw-bold" id="dash-stk">฿0</h4>
            </div></div>
        </div>

        <h5 class="fw-bold mb-3"><i class="bi bi-bicycle"></i> จัดการสถานะรถ</h5>
        <div class="row g-2 mb-4 text-center">
            <div class="col-4"><a href="inventory.html?status=wait" class="text-decoration-none text-dark">
                <div class="card-dash shadow-sm"><div class="h3 fw-bold" id="c-wait">0</div><small class="text-muted">รอซ่อม</small></div>
            </a></div>
            <div class="col-4"><a href="inventory.html?status=doing" class="text-decoration-none text-dark">
                <div class="card-dash shadow-sm"><div class="h3 fw-bold text-warning" id="c-doing">0</div><small class="text-muted">ซ่อมอยู่</small></div>
            </a></div>
            <div class="col-4"><a href="inventory.html?status=ready" class="text-decoration-none text-dark">
                <div class="card-dash shadow-sm"><div class="h3 fw-bold text-success" id="c-ready">0</div><small class="text-muted">พร้อมขาย</small></div>
            </a></div>
        </div>

        <h6 class="fw-bold text-danger mb-2"><i class="bi bi-bell-fill"></i> แจ้งเตือนเอกสารด่วน</h6>
        <div id="alert-list" class="list-group small shadow-sm"></div>
    </div>

    <div class="nav-bottom shadow">
        <a href="index.html" class="nav-btn active">🏠 หน้าแรก</a>
        <a href="inventory.html" class="nav-btn">🏍️ สต็อก</a>
        <a href="repair.html" class="nav-btn">🛠️ อู่ซ่อม</a>
        <a href="finance.html" class="nav-btn">💰 บัญชี</a>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyoFOD4-wunr3zVSXDwbF4dFArNwvEw1ZN1AqqzZyN8hvfzrqzcWDk_kaDexJ9x2-M/exec";
        async function load() {
            const res = await fetch(`${API_URL}?action=getMasterData`);
            const data = await res.json();
            document.getElementById('dash-bal').innerText = '฿'+(data.dashboard.balance||0).toLocaleString();
            document.getElementById('dash-pro').innerText = '฿'+(data.dashboard.profit||0).toLocaleString();
            document.getElementById('dash-stk').innerText = '฿'+(data.dashboard.stock||0).toLocaleString();
            
            let w=0, d=0, r=0, alerts='';
            data.bikes.forEach(b => {
                if(b.status === 'รอซ่อม') w++; if(b.status === 'ซ่อมอยู่') d++; if(b.status === 'พร้อมขาย') r++;
                // ใส่ logic alerts ต่อได้
            });
            document.getElementById('c-wait').innerText = w;
            document.getElementById('c-doing').innerText = d;
            document.getElementById('c-ready').innerText = r;
        }
        window.onload = load;
    </script>
</body>
</html>
