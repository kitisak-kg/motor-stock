<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTOR MASTER Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: sans-serif; padding-bottom: 80px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-btn { border: none; background: none; font-weight: bold; color: #6c757d; font-size: 0.8rem; }
        .nav-btn.active { color: #0d6efd; }
        .card-bike { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div id="loader" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:2000;" class="bg-white p-4 shadow rounded text-center">
        <div class="spinner-border text-primary mb-2"></div><br>กำลังประมวลผล...
    </div>

    <div class="container mt-3 page active" id="page-inventory">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold m-0">🏍️ สต็อกรถทั้งหมด</h5>
            <button class="btn btn-primary btn-sm rounded-pill px-3 fw-bold" onclick="openBikeModal('add')">+ รับรถเข้า</button>
        </div>
        <div id="list-inventory"></div>
    </div>

    <div class="nav-bottom shadow">
        <button class="nav-btn" onclick="showPage('home')">หน้าแรก</button>
        <button class="nav-btn active" onclick="showPage('inventory')">สต็อก</button>
        <button class="nav-btn" onclick="showPage('repair')">อู่ซ่อม</button>
        <button class="nav-btn" onclick="showPage('finance')">บัญชี</button>
    </div>

    <div class="modal fade" id="modal-bike" tabindex="-1"><div class="modal-dialog modal-dialog-scrollable"><div class="modal-content border-0">
        <div class="modal-header bg-dark text-white"><h6 class="modal-title fw-bold" id="bikeModalTitle">ลงทะเบียนรถใหม่</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body small">
            <input type="hidden" id="m-rowIdx">
            <div class="row g-2">
                <div class="col-6"><label>วันที่ซื้อเข้า</label><input type="date" id="m-buyDate" class="form-control"></div>
                <div class="col-6"><label>ทะเบียน</label><input type="text" id="m-plate" class="form-control" placeholder="1กข 1234"></div>
                <div class="col-6"><label>ยี่ห้อ</label><select id="m-brand" class="form-select"><option>HONDA</option><option>YAMAHA</option><option>อื่นๆ</option></select></div>
                <div class="col-6"><label>รุ่นรถ</label><input type="text" id="m-model" class="form-control"></div>
                <div class="col-4"><label>ปีผลิต</label><input type="number" id="m-year" class="form-control"></div>
                <div class="col-4"><label>สี</label><input type="text" id="m-color" class="form-control"></div>
                <div class="col-4"><label>เลขไมล์</label><input type="number" id="m-mile" class="form-control"></div>
                <div class="col-12"><label>เลขเครื่อง / เลขถัง</label>
                    <div class="input-group"><input type="text" id="m-eng" class="form-control" placeholder="เลขเครื่อง"><input type="text" id="m-cha" class="form-control" placeholder="เลขถัง"></div>
                </div>
                <div class="col-6"><label>แหล่งที่มา</label><input type="text" id="m-source" class="form-control" placeholder="เช่น SIA"></div>
                <div class="col-6"><label>เลขล็อต</label><input type="text" id="m-lot" class="form-control"></div>
            </div>
            
            <div class="row g-2 mt-2 bg-light p-2 rounded">
                <div class="col-4"><label>ราคาประมูล</label><input type="number" id="m-hammer" class="form-control"></div>
                <div class="col-4"><label>ค่าขนย้าย</label><input type="number" id="m-transport" class="form-control"></div>
                <div class="col-4"><label>ค่าดำเนินการ</label><input type="number" id="m-fee" class="form-control"></div>
                <div class="col-12"><label class="text-success fw-bold">ราคาตั้งขาย</label><input type="number" id="m-target" class="form-control border-success fw-bold"></div>
            </div>

            <div class="row g-2 mt-2 bg-danger bg-opacity-10 p-2 rounded">
                <div class="col-6"><label class="text-danger fw-bold">ภาษีหมดอายุ</label><input type="date" id="m-taxExp" class="form-control"></div>
                <div class="col-6"><label class="text-danger fw-bold">บัตร ปชช. หมดอายุ</label><input type="date" id="m-idExp" class="form-control"></div>
            </div>

            <div class="row g-2 mt-2">
                <div class="col-6"><label>สถานะรถ</label><select id="m-status" class="form-select"><option>รอซ่อม</option><option>ซ่อมอยู่</option><option>พร้อมขาย</option></select></div>
                <div class="col-6"><label>สถานะเล่ม</label><select id="m-book" class="form-select"><option>อยู่ที่ร้าน</option><option>รอชุดโอน</option><option>ส่งโอนแล้ว</option><option>โอนเสร็จ</option></select></div>
                <div class="col-6"><label>คนทำโอน</label><input type="text" id="m-assignee" class="form-control"></div>
                <div class="col-12"><label>หมายเหตุทะเบียน</label><input type="text" id="m-docNote" class="form-control"></div>
                <div class="col-12"><label>หมายเหตุสต็อก</label><textarea id="m-stockNote" class="form-control" rows="2"></textarea></div>
            </div>
            <button class="btn btn-dark w-100 mt-3 fw-bold py-2" onclick="saveBike()">บันทึกข้อมูลเข้าชีท</button>
        </div>
    </div></div></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyoFOD4-wunr3zVSXDwbF4dFArNwvEw1ZN1AqqzZyN8hvfzrqzcWDk_kaDexJ9x2-M/exec";

        // ฟังก์ชันส่งข้อมูลไป GAS
        async function saveBike() {
            const rowIdx = document.getElementById('m-rowIdx').value;
            const action = rowIdx ? 'updateBike' : 'saveBike';
            
            const payload = {
                action: action,
                rowIdx: rowIdx,
                buyDate: document.getElementById('m-buyDate').value,
                plate: document.getElementById('m-plate').value,
                brand: document.getElementById('m-brand').value,
                model: document.getElementById('m-model').value,
                year: document.getElementById('m-year').value,
                color: document.getElementById('m-color').value,
                mile: document.getElementById('m-mile').value,
                eng: document.getElementById('m-eng').value,
                cha: document.getElementById('m-cha').value,
                source: document.getElementById('m-source').value,
                lot: document.getElementById('m-lot').value,
                hammer: document.getElementById('m-hammer').value || 0,
                transport: document.getElementById('m-transport').value || 0,
                fee: document.getElementById('m-fee').value || 0,
                targetPrice: document.getElementById('m-target').value || 0,
                taxExp: document.getElementById('m-taxExp').value,
                idExp: document.getElementById('m-idExp').value,
                status: document.getElementById('m-status').value,
                bookStatus: document.getElementById('m-book').value,
                assignee: document.getElementById('m-assignee').value,
                docNote: document.getElementById('m-docNote').value,
                stockNote: document.getElementById('m-stockNote').value
            };

            document.getElementById('loader').style.display = 'block';
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("บันทึกข้อมูลเรียบร้อย!");
            location.reload();
        }

        // ฟังก์ชันเปิด Modal สำหรับเพิ่ม/แก้ไข
        function openBikeModal(mode, data = null) {
            document.getElementById('bikeModalTitle').innerText = mode === 'add' ? 'ลงทะเบียนรถใหม่' : 'แก้ไขข้อมูลรถ';
            document.getElementById('m-rowIdx').value = data ? data.rowIdx : '';
            // เคลียร์ค่าหรือใส่ค่าเดิม (Logic การดึงค่าใส่ Input)
            // ... (ใส่ Logic ดึงค่าจาก data มาใส่ id ต่างๆ) ...
            new bootstrap.Modal(document.getElementById('modal-bike')).show();
        }
    </script>
</body>
</html>
